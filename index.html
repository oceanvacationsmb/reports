function saveToGitHub(type,callback){
  if(!githubToken){
    alert("❌ No token");
    return;
  }
  
  const data=JSON.stringify({owners:OWNERS,vendors:vendors,properties:propertySettings,expenses:expenses},null,2);
  const content=btoa(unescape(encodeURIComponent(data)));
  
  function attemptSave(retryCount=0){
    fetch(getGitHubAPI(),{headers:{"Authorization":"token "+githubToken}})
      .then(r=>{
        if(r.status===404){
          return {sha:null, create:true};
        }
        if(!r.ok)throw new Error("GET failed: "+r.status);
        return r.json().then(data=>({sha:data.sha, create:false}));
      })
      .then(({sha,create})=>{
        const body={message:"Update "+type,content:content};
        if(sha) body.sha=sha;
        
        return fetch(getGitHubAPI(),{
          method:"PUT",
          headers:{"Authorization":"token "+githubToken,"Content-Type":"application/json"},
          body:JSON.stringify(body)
        }).then(r=>({response:r,sha:sha}));
      })
      .then(({response,sha})=>{
        if(response.status===409){
          if(retryCount<3){
            setTimeout(()=>attemptSave(retryCount+1), 2000);
          }else{
            alert("❌ Could not save after 4 attempts");
          }
          return;
        }
        
        if(response.ok||response.status===200||response.status===201){
          if(callback)callback();
          return;
        }
        
        throw new Error("PUT failed: "+response.status);
      })
      .catch(e=>{
        if(retryCount<3){
          setTimeout(()=>attemptSave(retryCount+1), 2000);
        }
      });
  }
  
  attemptSave();
}

}

box.innerHTML = html;

}

document.addEventListener("click",function(e){

if(e.target.classList.contains("editRow")){

const row = e.target.closest("tr");

const acc = row.querySelector(".acc");
const clean = row.querySelector(".clean");

const accVal = acc.dataset.val;
const cleanVal = clean.dataset.val;

acc.innerHTML = "<input class='accInput' type='number' value='"+accVal+"' style='width:90px'>";
clean.innerHTML = "<input class='cleanInput' type='number' value='"+cleanVal+"' style='width:90px'>";

e.target.innerText="Save";
e.target.classList.remove("editRow");
e.target.classList.add("saveRow");

}

else if(e.target.classList.contains("saveRow")){

const row = e.target.closest("tr");

const accInput = row.querySelector(".accInput");
const cleanInput = row.querySelector(".cleanInput");

const acc = row.querySelector(".acc");
const clean = row.querySelector(".clean");

const accVal = Number(accInput.value)||0;
const cleanVal = Number(cleanInput.value)||0;

 if(accVal < 0 || cleanVal < 0) return;

const prop = row.dataset.prop;
const index = parseInt(row.dataset.row);

const r = propertyTotals[prop].reservations[index];

const oldAcc = num(r["TOTAL PAYOUT"]) - num(r["CLEANING FARE"]);
const oldClean = num(r["CLEANING FARE"]);

r["CLEANING FARE"] = cleanVal;
acc.dataset.val = accVal;
clean.dataset.val = cleanVal;
 
propertyTotals[prop].acc += (accVal - oldAcc);
propertyTotals[prop].clean += (cleanVal - oldClean);

acc.innerHTML="$"+accVal.toFixed(2);
clean.innerHTML="$"+cleanVal.toFixed(2);
row.style.background="#fff8cc";

e.target.innerText="Edit";
e.target.classList.remove("saveRow");
e.target.classList.add("editRow");

processData();
displayStatement();

}

});
  
</script>
