        left: 0;
        width: 240px;
        height: 100vh;
        background: #1f2a38;
        color: #fff;
        padding: 15px;
        box-sizing: border-box;
        overflow-y: auto;
    }

    .sidebar h2 {

        padding-bottom: 4px;
    }

    .btn {
        width: 100%;
        margin-bottom: 8px;
        padding: 8px;
        border: none;
        cursor: pointer;
        font-size: 11px;
        border-radius: 4px;
        background: #3498db;
        color: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .btn:hover {
        background: #2980b9;
    }

    .icon {
        font-size: 12px;
        opacity: 0.9;
    }

    .topbar {
        position: fixed;
        top: 0;
        left: 240px;
        right: 0;
        height: 50px;
        background: #ffffff;
        border-bottom: 1px solid #ddd;
        display: flex;
        align-items: center;
        padding-left: 20px;
        font-weight: bold;
        z-index: 10;
    }

    .iframe-container {
        position: fixed;
        top: 50px;
        left: 240px;
        right: 0;
        bottom: 0;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>

function openAccessLink(url) {
    const cacheBreaker = "v=" + new Date().getTime();
    document.getElementById("contentFrame").src = url + (url.includes("?") ? "&" : "?") + cacheBreaker;
}

function openNewTab(url) {
    window.open(url, "_blank");
}

            }

            .split-box {
