<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OCEAN VACATIONS TOOLS ACCESS PAGE</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f6fa;
    }

    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 240px;
        height: 100vh;
        background: #1f2a38;
        color: #fff;
        padding: 15px;
        box-sizing: border-box;
        overflow-y: auto;
    }

    .sidebar h2 {
        font-size: 16px;
        margin-bottom: 10px;
    }

    .settings-header {
        font-size: 12px;
        margin: 15px 0 8px;
        color: #9fb3c8;
        border-bottom: 1px solid #2f3d4f;
        padding-bottom: 4px;
    }

    .btn {
        width: 100%;
        margin-bottom: 8px;
        padding: 8px;
        border: none;
        cursor: pointer;
        font-size: 11px;
        border-radius: 4px;
        background: #3498db;
        color: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .btn:hover {
        background: #2980b9;
    }

    .icon {
        font-size: 12px;
        opacity: 0.9;
    }

    .topbar {
        position: fixed;
        top: 0;
        left: 240px;
        right: 0;
        height: 50px;
        background: #ffffff;
        border-bottom: 1px solid #ddd;
        display: flex;
        align-items: center;
        padding-left: 20px;
        font-weight: bold;
        z-index: 10;
    }

    .iframe-container {
        position: fixed;
        top: 50px;
        left: 240px;
        right: 0;
        bottom: 0;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>

<body>

<div class="sidebar">
    <h2>OCEAN VACATIONS</h2>

    <div class="settings-header">TOOLS</div>

    <button class="btn" onclick="openNewTab('https://www.oceanvacationsmb.com')">
        WEBSITE <span class="icon">↗</span>
    </button>

    <button class="btn" onclick="openAccessLink('https://oceanvacationsmb.github.io/tax-remittance-dashboard/index.html')">
        TAXES REPORT
    </button>

    <button class="btn" onclick="openAccessLink('https://oceanvacationsmb.github.io/owner_income_report/index.html')">
        OWNER PORTAL
    </button>

    <button class="btn" onclick="openAccessLink('https://oceanvacationsmb.github.io/reports/property_estimate.html')">
        PROPERTY GRI ESTIMATOR
    </button>

    <button class="btn" onclick="openAccessLink('https://oceanvacationsmb.github.io/collage/')">
        COLLAGE TOOL
    </button>

    <button class="btn" onclick="openNewTab('YOUR_DOCUSIGN_LINK_HERE')">
        DOCUSIGN <span class="icon">↗</span>
    </button>

    <button class="btn" onclick="openNewTab('YOUR_PRICE_ADJUSTMENT_LINK_HERE')">
        PRICE ADJUSTMENT <span class="icon">↗</span>
    </button>

    <button class="btn" onclick="openNewTab('https://www.airbnb.com')">
        AIRBNB <span class="icon">↗</span>
    </button>

    <button class="btn" onclick="openNewTab('https://www.airbnb.com/help/resolutions')">
        AIRBNB RESOLUTION <span class="icon">↗</span>
    </button>

    <div class="settings-header">CONTACT</div>

    <button class="btn" onclick="loadContactPage()">
        CONTACT INFO
    </button>
</div>

<div class="topbar">
    OCEAN VACATIONS TOOLS ACCESS PAGE
</div>

<div class="iframe-container">
    <iframe id="contentFrame"></iframe>
</div>

<script>
function openAccessLink(url) {
    const cacheBreaker = "v=" + new Date().getTime();
    document.getElementById("contentFrame").src = url + (url.includes("?") ? "&" : "?") + cacheBreaker;
}

function openNewTab(url) {
    window.open(url, "_blank");
}

                <button onclick="showContactSection('filter')">Filter Size</button>
            </div>

            <div id="contactDetails" style="padding:20px;background:#f1f4f8;border-radius:8px;">
                Select a section above.

        </div>

        <script>
            function showContactSection(section) {

window.onload = function() {
    document.getElementById("contentFrame").srcdoc = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;font-family:Arial;">
            <img src="<img src="https://oceanvacationsmb.github.io/reports/ChatGPT%20Image%20Apr%2026%2C%202026%2C%2006_07_25%20PM.png" style="max-width:300px;margin-bottom:20px;">

};
</script>

</body>
</html>
