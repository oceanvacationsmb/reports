<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OCEAN VACATIONS TOOLS ACCESS PAGE</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f6fa;
    }

    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 220px;
        height: 100vh;
        background: #1f2a38;
        color: #fff;
        padding: 15px;
        box-sizing: border-box;
    }

    .sidebar h2 {
        font-size: 16px;
        margin-bottom: 10px;
    }

    .settings-header {
        font-size: 12px;
        margin: 15px 0 8px;
        color: #9fb3c8;
        border-bottom: 1px solid #2f3d4f;
        padding-bottom: 4px;
    }

    .btn {
        width: 100%;
        margin-bottom: 8px;
        padding: 8px;
        border: none;
        cursor: pointer;
        font-size: 11px;
        border-radius: 4px;
        background: #3498db;
        color: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .btn:hover {
        background: #2980b9;
    }

    .icon {
        font-size: 12px;
        opacity: 0.8;
    }

    .topbar {
        position: fixed;
        top: 0;
        left: 220px;
        right: 0;
        height: 50px;
        background: #ffffff;
        border-bottom: 1px solid #ddd;
        display: flex;
        align-items: center;
        padding-left: 20px;
        font-weight: bold;
        z-index: 10;
    }

    .iframe-container {
        position: fixed;
        top: 50px;
        left: 220px;
        right: 0;
        bottom: 0;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>

<body>

<div class="sidebar">
    <h2>OCEAN VACATIONS</h2>

    <div class="settings-header">TOOLS</div>

    <!-- INTERNAL (iframe) -->
    <button class="btn" onclick="openAccessLink('https://oceanvacationsmb.github.io/tax-remittance-dashboard/index.html')">
        TAXES REPORT
    </button>

    <button class="btn" onclick="openAccessLink('https://oceanvacationsmb.github.io/owner_income_report/index.html')">
        OWNER PORTAL
    </button>

    <button class="btn" onclick="openAccessLink('https://oceanvacationsmb.github.io/reports/property_estimate.html')">
        PROPERTY GRI ESTIMATOR
    </button>

    <button class="btn" onclick="openAccessLink('https://oceanvacationsmb.github.io/collage/')">
        COLLAGE TOOL
    </button>

    <!-- EXTERNAL (new tab / login required) -->
    <button class="btn" onclick="openNewTab('https://www.airbnb.com')">
        AIRBNB <span class="icon">↗</span>
    </button>

    <button class="btn" onclick="openNewTab('https://www.airbnb.com/resolutions')">
        AIRBNB RESOLUTION <span class="icon">↗</span>
    </button>

    <button class="btn" onclick="openNewTab('https://app.guesty.com')">
        GUESTY <span class="icon">↗</span>
    </button>

    <button class="btn" onclick="openNewTab('https://paleturquoise-baboon-311445.hostingersite.com/login.php')">
        PRICE ADJUSTMENTS <span class="icon">↗</span>
    </button>

    <button class="btn" onclick="openNewTab('https://app.signnow.com/webapp/documents/b598cffbdb334ddeb18c7783528c31cf05c2b803')">
        DOCUSIGN <span class="icon">↗</span>
    </button>
    
</div>

<div class="topbar">
    OCEAN VACATIONS TOOLS ACCESS PAGE
</div>

<div class="iframe-container">
    <iframe id="contentFrame" src=""></iframe>
</div>

<script>
function openAccessLink(url) {
    const cacheBreaker = "v=" + new Date().getTime();

    if (url.includes("?")) {
        document.getElementById("contentFrame").src = url + "&" + cacheBreaker;
    } else {
        document.getElementById("contentFrame").src = url + "?" + cacheBreaker;
    }
}

function openNewTab(url) {
    window.open(url, "_blank");
}
</script>

</body>
</html>
