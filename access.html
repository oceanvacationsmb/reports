<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OCEAN VACATIONS TOOLS ACCESS PAGE</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f6fa;
    }

    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 220px;
        height: 100vh;
        background: #1f2a38;
        color: #fff;
        padding: 15px;
        box-sizing: border-box;
    }

    .sidebar h2 {
        font-size: 16px;
        margin-bottom: 10px;
    }

    .settings-header {
        font-size: 12px;
        margin: 15px 0 8px;
        color: #9fb3c8;
        border-bottom: 1px solid #2f3d4f;
        padding-bottom: 4px;
    }

    .btn {
        width: 100%;
        margin-bottom: 8px;
        padding: 8px;
        border: none;
        cursor: pointer;
        font-size: 11px;
        border-radius: 4px;
        background: #3498db;
        color: #fff;
    }

    .btn:hover {
        background: #2980b9;
    }

    .topbar {
        position: fixed;
        top: 0;
        left: 220px;
        right: 0;
        height: 50px;
        background: #ffffff;
        border-bottom: 1px solid #ddd;
        display: flex;
        align-items: center;
        padding-left: 20px;
        font-weight: bold;
        z-index: 10;
    }

    .iframe-container {
        position: fixed;
        top: 50px;
        left: 220px;
        right: 0;
        bottom: 0;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>

<body>

<div class="sidebar">
    <h2>OCEAN VACATIONS</h2>

    <div id="accessHeader" class="settings-header">TOOLS</div>

    <button class="btn" onclick="openAccessLink('https://oceanvacationsmb.github.io/tax-remittance-dashboard/index.html')">
        TAXES REPORT
    </button>

    <button class="btn" onclick="openAccessLink('https://oceanvacationsmb.github.io/owner_income_report/index.html')">
        OWNER PORTAL
    </button>

    <button class="btn" onclick="openAccessLink('https://oceanvacationsmb.github.io/reports/property_estimate.html')">
        PROPERTY GRI ESTIMATOR
    </button>

    <button class="btn" onclick="openAccessLink('https://oceanvacationsmb.github.io/collage/')">
        COLLAGE TOOL
    </button>

    <button class="btn" onclick="openAccessLink('https://www.airbnb.com/hosting')">
        AIRBNB
    </button>

    <button class="btn" onclick="openAccessLink('https://www.airbnb.com/resolutions')">
        AIRBNB RESOLUTION CENTER
    </button>

    <button class="btn" onclick="openAccessLink('https://app.signnow.com/webapp/documents/538503b037ba43bbb7f9281054f4eb181e1d79f2')">
        SIGN DOCUMENTS
    </button>
    
</div>

<div class="topbar">
    OCEAN VACATIONS TOOLS ACCESS PAGE
</div>

<div class="iframe-container">
    <iframe id="contentFrame" src=""></iframe>
</div>

<script>
function openAccessLink(url) {
    const cacheBreaker = "v=" + new Date().getTime();

    if (url.includes("?")) {
        document.getElementById("contentFrame").src = url + "&" + cacheBreaker;
    } else {
        document.getElementById("contentFrame").src = url + "?" + cacheBreaker;
    }
}
</script>

</body>
</html>
